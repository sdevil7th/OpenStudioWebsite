  <body class="dark">
    <div id="openstudio-boot-loader" role="status" aria-live="polite">
      <div class="os-boot__ambient" aria-hidden="true"></div>
      <div class="os-boot__content">
        <div class="os-boot__mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <strong>OpenStudio</strong>
        <p>Preparing the production surface</p>
      </div>
      <div class="os-boot__progress" aria-hidden="true"><span></span></div>
    </div>
    <div id="root"></div>
    <script>
      (() => {
        const loader = document.getElementById("openstudio-boot-loader");
        if (!loader) return;

        window.__openstudioBootLoaderActive = true;
        window.__openstudioBootLoaderDismissed = false;

        const startedAt = performance.now();
        const minimumVisibleMs = 420;
        const fallbackMs = 4500;
        let routeReady = false;
        let hidden = false;
        let fallbackTimer = 0;

        const finish = () => {
          if (hidden || !routeReady) return;

          const elapsed = performance.now() - startedAt;
          if (elapsed < minimumVisibleMs) {
            window.setTimeout(finish, minimumVisibleMs - elapsed);
            return;
          }

          hidden = true;
          window.clearTimeout(fallbackTimer);
          loader.classList.add("os-boot--complete");
          window.setTimeout(() => {
            loader.remove();
            window.__openstudioBootLoaderActive = false;
            window.__openstudioBootLoaderDismissed = true;
            window.dispatchEvent(new CustomEvent("openstudio:boot-hidden"));
          }, window.matchMedia("(prefers-reduced-motion: reduce)").matches ? 90 : 320);
        };

        window.addEventListener(
          "openstudio:app-ready",
          () => {
            routeReady = true;
            finish();
          },
          { once: true },
        );

        fallbackTimer = window.setTimeout(() => {
          routeReady = true;
          finish();
        }, fallbackMs);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
