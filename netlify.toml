[build]
  command = "npm run build"
  publish = "dist"

[functions]
  included_files = ["public/assets/openstudio/generated/image-manifest.json"]

[[headers]]
  for = "/assets/openstudio/generated/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/download/windows/latest"
  to = "/.netlify/functions/download-latest-windows"
  status = 200
  force = true

[[redirects]]
  from = "/download/macos/latest"
  to = "/.netlify/functions/download-latest-macos"
  status = 200
  force = true

[[redirects]]
  from = "/download/linux/latest"
  to = "/.netlify/functions/download-latest-linux"
  status = 200
  force = true

[[redirects]]
  from = "/download/ai-runtime/windows/latest"
  to = "/.netlify/functions/download-latest-ai-runtime-windows"
  status = 200
  force = true

[[redirects]]
  from = "/download/ai-runtime/macos/latest"
  to = "/.netlify/functions/download-latest-ai-runtime-macos"
  status = 200
  force = true

[[redirects]]
  from = "/download/ai-runtime/macos/arm64/latest"
  to = "/.netlify/functions/download-latest-ai-runtime-macos-arm64"
  status = 200
  force = true

[[redirects]]
  from = "/download/ai-runtime/macos/x64/latest"
  to = "/.netlify/functions/download-latest-ai-runtime-macos-x64"
  status = 200
  force = true

[[redirects]]
  from = "/download/ai-runtime/linux/latest"
  to = "/.netlify/functions/download-latest-ai-runtime-linux"
  status = 200
  force = true

[[redirects]]
  from = "/download/ai-runtime/linux/x64/latest"
  to = "/.netlify/functions/download-latest-ai-runtime-linux-x64"
  status = 200
  force = true

[[redirects]]
  from = "/download/ai-runtime/linux/arm64/latest"
  to = "/.netlify/functions/download-latest-ai-runtime-linux-arm64"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
